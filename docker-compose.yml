# PROMPT:
# Generate a docker-compose.yml that starts the FastAPI API and the Streamlit
# dashboard together. The dashboard must wait for the API to be healthy before
# starting. Persist the SQLite database with a named volume. No extra services.
#
# CHANGES MADE:
# - Uses named volume `db_data` for SQLite so data survives `docker compose down`
# - Dashboard uses `depends_on` with `condition: service_healthy` so it only
#   starts after the API passes its HEALTHCHECK — prevents connection errors
#   on first boot
# - Both services share an internal `app_net` bridge network. The dashboard
#   reaches the API via http://api:8000 (container name, not localhost)
# - Environment variables are set at the compose level so they're easy to
#   override without editing this file (use a .env file or -e flags)
# - POS CSV is bind-mounted from ./data so it can be updated without rebuilding

version: "3.9"

services:

  # ── FastAPI analytics backend ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: store_intel_api
    restart: unless-stopped
    ports:
      - "8000:8000"       # http://localhost:8000
    volumes:
      # Persist the SQLite database across restarts
      - db_data:/app/data/db
      # Live-mount the POS CSV so you can update it without rebuilding
      - ./data/pos_transactions.csv:/app/data/pos_transactions.csv:ro
    environment:
      DATABASE_URL: "sqlite:////app/data/db/store_intel.db"
      LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s    # give Uvicorn time to start before first check
    networks:
      - app_net

  # ── Streamlit live dashboard ────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: store_intel_dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy   # only start after API passes health check
    ports:
      - "8501:8501"       # http://localhost:8501
    volumes:
      - ./dashboard:/app/dashboard:ro
    working_dir: /app
    environment:
      API_URL:  "http://api:8000"    # internal Docker network name, not localhost
      STORE_ID: "store_mumbai_01"
    command: >
      streamlit run dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --browser.gatherUsageStats false
    networks:
      - app_net

# ── Named volumes ───────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local

# ── Internal network ────────────────────────────────────────────────────────
networks:
  app_net:
    driver: bridge
